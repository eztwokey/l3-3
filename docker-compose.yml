services:
  postgres:
    image: postgres:16-alpine
    container_name: commenttree-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: commenttree
      POSTGRES_PASSWORD: commenttree
      POSTGRES_DB: commenttree
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: